name: Deploy Backend

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment specific variables
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "DEPLOY_PATH=/var/www/ridaa-master" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=ridaa-backend-prod" >> $GITHUB_OUTPUT
            echo "PORT=5002" >> $GITHUB_OUTPUT
            echo "MONGO_VOLUME=ridaa-mongo-master" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_PATH=/var/www/ridaa-staging" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=ridaa-backend-staging" >> $GITHUB_OUTPUT
            echo "PORT=5001" >> $GITHUB_OUTPUT
            echo "MONGO_VOLUME=ridaa-mongo-staging" >> $GITHUB_OUTPUT
          fi

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: ${{ steps.vars.outputs.DEPLOY_PATH }}
          rm: true
          exclude: "node_modules,.git,.github,.env"

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ github.ref_name == 'master' && secrets.master_ENV_FILE || secrets.STAGING_ENV_FILE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_FILE
          script: |
            set -e
            DEPLOY_PATH="${{ steps.vars.outputs.DEPLOY_PATH }}"
            CONTAINER_NAME="${{ steps.vars.outputs.CONTAINER_NAME }}"
            PORT="${{ steps.vars.outputs.PORT }}"
            MONGO_VOLUME="${{ steps.vars.outputs.MONGO_VOLUME }}"

            cd "$DEPLOY_PATH"

            # Write env file from secret
            printf "%s" "$ENV_FILE" > .env

            # Generate docker-compose override using printf to avoid heredoc indentation issues
            printf "services:\n  api:\n    container_name: %s\n    ports:\n      - \"%s:5000\"\n  mongo:\n    container_name: ridaa-mongo-%s\n    volumes:\n      - %s:/data/db\nvolumes:\n  %s:\n" \
              "$CONTAINER_NAME" "$PORT" "$PORT" "$MONGO_VOLUME" "$MONGO_VOLUME" \
              > docker-compose.override.yml

            # Stop and remove old containers cleanly to avoid ContainerConfig issues
            /usr/local/bin/docker-compose -f docker-compose.yml -f docker-compose.override.yml down --remove-orphans || true

            # Start fresh
            /usr/local/bin/docker-compose -f docker-compose.yml -f docker-compose.override.yml up --build -d
